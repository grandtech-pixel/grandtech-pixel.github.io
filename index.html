<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play Video Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
    }
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(88,101,242,0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.4px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #8b949e;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 10px;
      font-size: 1.02rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.6s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .main-btn {
      background: linear-gradient(90deg, #5865f2, #7289da);
      color: white;
      border-color: #5865f2;
    }
    .main-btn:hover {
      background: linear-gradient(90deg, #4752c4, #5a6ecd);
      box-shadow: 0 0 30px rgba(88,101,242,0.4);
    }
    .alt-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }
    .alt-btn:hover {
      background: #2d333b;
      color: #ffffff;
      border-color: #6e7681;
    }
    .btn-label {
      font-size: 0.82rem;
      color: #6e7681;
      text-align: center;
      margin-top: 6px;
      display: block;
    }
    @media (max-width: 480px) {
      .container {
        padding: 28px 20px;
      }
      h1 { font-size: 1.7rem; }
      .btn { font-size: 0.98rem; padding: 15px 18px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Watch Video Instantly</h1>
    <p class="subtitle">High-quality stream • No registration • Click to play</p>

    <a id="mainlink" href="https://braceslinear.com/d40w8mx5c?key=e15240371508f21838848c29a618630a" class="btn main-btn">Click Link To Watch</a>

    <a id="alt1" href="#" class="btn alt-btn">https://cdn.videy.co/TLgW8TGT1.mp4</a>

    <a href="https://braceslinear.com/d40w8mx5c?key=e15240371508f21838848c29a618630a" class="btn alt-btn">Alternative 1</a>

    <a href="https://braceslinear.com/d40w8mx5c?key=e15240371508f21838848c29a618630a" class="btn alt-btn">Alternative 2</a>
    <span class="btn-label">Primary Stream</span>
  </div>

  <script>
    function updateLinks() {
      const urlParams = new URLSearchParams(window.location.search);
      let videoId = urlParams.get('id') || 'TLgW8TGT1';

      const fakeDisplay = `https://cdn.videy.co/${videoId}.mp4`;

      const realGitHubUrl = `https://amplify-video-tv.github.io/${videoId}.mp4`;

      const alt1 = document.getElementById('alt1');
      if (alt1) {
        alt1.textContent = fakeDisplay;
        alt1.href = realGitHubUrl;
      }
    }

    window.addEventListener('load', updateLinks);
    updateLinks();
  </script>

</body>
</html>
