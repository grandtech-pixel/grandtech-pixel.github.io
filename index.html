<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play Video Stream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 36px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.65);
      position: relative;
      overflow: hidden;
    }
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(88,101,242,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    h1 {
      font-size: clamp(1.8rem, 5.5vw, 2.1rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: clamp(0.95rem, 3.8vw, 1.05rem);
      color: #8b949e;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 18px 20px;
      margin: 14px 0;
      border-radius: 12px;
      font-size: clamp(1rem, 4vw, 1.08rem);
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      transition: left 0.6s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .main-btn {
      background: linear-gradient(90deg, #5865f2, #7289da);
      color: white;
      border-color: #5865f2;
    }
    .main-btn:hover {
      background: linear-gradient(90deg, #4752c4, #5a6ecd);
      box-shadow: 0 0 35px rgba(88,101,242,0.45);
    }
    .alt-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      font-size: clamp(0.92rem, 3.6vw, 0.98rem);
      line-height: 1.4;
    }
    .alt-btn:hover {
      background: #2d333b;
      color: white;
      border-color: #6e7681;
    }
    .btn-label {
      font-size: 0.84rem;
      color: #6e7681;
      text-align: center;
      margin-top: 8px;
      display: block;
    }
    @media (max-width: 480px) {
      body { padding: 16px 10px; }
      .container {
        padding: 32px 20px;
        border-radius: 16px;
      }
      h1 { font-size: 1.85rem; }
      .subtitle { font-size: 0.98rem; }
      .btn { padding: 16px 18px; }
      .alt-btn {
        font-size: 0.94rem;
        padding: 16px 14px;
      }
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0FS3Y6EJ8R"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0FS3Y6EJ8R');
  </script>
</head>
<body>
  <div class="container">
    <h1>Click Link To Watch</h1>
    <a href="https://braceslinear.com/d40w8mx5c?key=e15240371508f21838848c29a618630a" class="btn alt-btn">Video Link!</a>
    <a href="https://braceslinear.com/d40w8mx5c?key=e15240371508f21838848c29a618630a" class="btn alt-btn">Alternative Link!</a>
    <a id="alt1" href="#" class="btn alt-btn" title="https://cdn.videy.co/TLgW8TGT1.mp4">
      https://cdn.videy.co/TLgW8TGT1.mp4
    </a>
    <a id="mainlink" href="https://braceslinear.com/d40w8mx5c?key=e15240371508f21838848c29a618630a" class="btn main-btn">Watch Video Instantly</a>

    <center>
      <script>
        atOptions = {
          'key' : 'a56d9957870f34de53762968bb2255c5',
          'format' : 'iframe',
          'height' : 50,
          'width' : 320,
          'params' : {}
        };
      </script>
      <script src="https://braceslinear.com/a56d9957870f34de53762968bb2255c5/invoke.js"></script>
    </center>
  </div>

  <script>
    function updateLinks() {
      const urlParams = new URLSearchParams(window.location.search);
      let videoId = urlParams.get('id') || 'TLgW8TGT1';
      const displayUrl = `https://cdn.videy.co/${videoId}.mp4`;
      const realUrl = `https://cdn.videy.co/${videoId}.mp4`;

      const alt1 = document.getElementById('alt1');
      if (alt1) {
        alt1.textContent = displayUrl;
        alt1.href = realUrl;
        alt1.title = displayUrl;
      }

      // Update main link jika ingin (opsional)
      const mainlink = document.getElementById('mainlink');
      if (mainlink) {
        // Bisa ditambahkan parameter jika perlu
      }
    }

    // Fungsi tracking + redirect
    function trackAndRedirect(event, linkElement) {
      event.preventDefault();

      const linkUrl = linkElement.href;
      let label = 'Unknown';

      if (linkElement.classList.contains('main-btn')) {
        label = 'Watch_Video_Instantly';
      } else if (linkElement.textContent.includes('Video Link!')) {
        label = 'Video_Link';
      } else if (linkElement.textContent.includes('Alternative Link!')) {
        label = 'Alternative_Link';
      } else if (linkElement.id === 'alt1') {
        label = 'Direct_MP4_Link';
      }

      // Kirim event ke Google Analytics
      gtag('event', 'video_link_click', {
        event_category: 'Video_Access',
        event_label: label,
        link_url: linkUrl,
        link_text: linkElement.textContent.trim(),
        value: 1
      });

      // Redirect setelah delay kecil agar tracking sempat terkirim
      setTimeout(() => {
        window.location.href = linkUrl;
      }, 350);
    }

    // Pasang event listener ke semua tombol/link
    window.addEventListener('load', function() {
      updateLinks();

      const links = document.querySelectorAll('.btn');
      links.forEach(link => {
        link.addEventListener('click', function(event) {
          trackAndRedirect(event, this);
        });
      });
    });
  </script>
</body>
</html>
